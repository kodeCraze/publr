name: Bug report
description: Report a reproducible bug in Chronex
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please give us enough detail to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Client app
        - Worker
        - Database / Drizzle
        - OAuth / auth
        - Media upload / Backblaze
        - Cloudflare queue / scheduling
        - Docs / setup
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs or screenshots
      description: Paste stack traces, console logs, Wrangler logs, or screenshots if available
      render: text

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Share relevant environment details without posting secrets
      placeholder: |
        OS:
        Node version:
        pnpm version:
        App URL:
        Local or production:

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I checked existing issues first
          required: true
        - label: I removed or redacted secrets from logs and screenshots
          required: true
