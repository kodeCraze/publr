name: Feature request
description: Suggest an improvement or new capability for Publr
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Clear problem statements make feature requests much easier to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: The current workflow is frustrating because...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Publr to do?
      placeholder: I would like Publr to...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Related area
      options:
        - Client app
        - Worker
        - Database / Drizzle
        - OAuth / auth
        - Media upload / Backblaze
        - Cloudflare queue / scheduling
        - Platform support
        - Docs / setup
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you considered, if any

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, examples, screenshots, or links

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I checked existing issues and feature requests first
          required: true
